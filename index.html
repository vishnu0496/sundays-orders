<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Sundays — Order Tracker</title>
  <style>

    /* "Kitchen Terminal" — warm editorial. IBM Plex Sans + JetBrains Mono + Space Grotesk (ui-ux-pro-max) */
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    :root{
      --bg:#15120d; --surface:#1e1a13; --surface2:#26211829;
      --ink:#f2ece0; --muted:#a89e8b; --faint:#6f6656;
      --line:rgba(242,236,224,.10); --line2:rgba(242,236,224,.17);
      --accent:#f5a524; --accent2:#f5a524; --accent-ink:#1a1408;
      --brand:#c2703a;
      --panel:#1e1a13;
      --green:#3fb96a; --red:#e5484d; --amber:#f5a524; --blue:#5aa2e8;
      --new:#8a8172; --packed:#f5a524; --dispatched:#5aa2e8; --delivered:#3fb96a;
      --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
      --display:'Space Grotesk','IBM Plex Sans',sans-serif;
      --radius:12px;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html{ -webkit-text-size-adjust:100%; }
    body{
      margin:0; font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5; padding-bottom:56px;
    }
    :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
    ::selection{ background:var(--accent); color:var(--accent-ink); }

    header{
      position:sticky; top:0; z-index:20; padding:15px 18px; display:flex; align-items:center; justify-content:space-between;
      background:var(--bg); border-bottom:1px solid var(--line2);
    }
    header h1{ margin:0; font-family:var(--display); font-size:19px; font-weight:700; letter-spacing:.06em;
      text-transform:uppercase; display:flex; align-items:center; gap:9px; color:var(--ink); }
    header h1 .ic{ width:1.15em; height:1.15em; color:var(--accent); }
    header .stats{ font-family:var(--mono); font-size:11px; font-weight:500; color:var(--muted); text-align:right; }
    .ic{ width:1em; height:1em; display:inline-block; vertical-align:-0.125em; flex-shrink:0; }

    main{ max-width:660px; margin:0 auto; padding:16px 14px; }
    .panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
    .panel h2{ margin:0 0 12px; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--accent); font-weight:500; }
    label{ display:block; font-size:12px; font-weight:600; color:var(--muted); margin:10px 0 5px; }
    input[type=text],input[type=tel],input[type=number],textarea,input#search{
      width:100%; padding:12px 13px; border:1px solid var(--line2); border-radius:9px; font-size:15px; font-family:inherit;
      background:#181510; color:var(--ink); transition:border-color .15s;
    }
    input::placeholder,textarea::placeholder{ color:var(--faint); }
    input:focus,textarea:focus{ outline:none; border-color:var(--accent); }
    textarea{ resize:vertical; min-height:48px; }

    .repeat-badge{ display:none; margin-top:8px; font-size:12px; font-weight:600; color:#eab98c;
      background:rgba(194,112,58,.16); border:1px solid rgba(194,112,58,.4); padding:5px 10px; border-radius:6px; width:fit-content; align-items:center; gap:5px; }
    .repeat-badge.show{ display:inline-flex; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:7px; border:none; border-radius:9px; padding:12px 16px;
      font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--accent-ink); background:var(--accent);
      transition:transform .06s, filter .15s; letter-spacing:.01em;
    }
    .btn:hover{ filter:brightness(1.08); }
    .btn:active{ transform:translateY(1px); }
    .btn.block{ width:100%; }
    .btn.green{ background:var(--green); color:#062012; }
    .btn.blue{ background:var(--blue); color:#04233b; }
    .btn.grey{ background:var(--surface2); color:var(--ink); }
    .btn.ghost{ background:transparent; color:var(--ink); border:1px solid var(--line2); }
    .btn.ghost:hover{ border-color:var(--accent); color:var(--accent); filter:none; }
    .btn.sm{ padding:9px 12px; font-size:13px; }

    #search{ margin-bottom:12px; }
    .cat-tabs{ display:flex; gap:7px; overflow-x:auto; margin-bottom:12px; padding-bottom:3px; }
    .cat-tab{ flex-shrink:0; padding:8px 14px; border-radius:7px; border:1px solid var(--line2); background:transparent;
      font-family:var(--mono); font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; white-space:nowrap; text-transform:uppercase; letter-spacing:.04em; transition:.15s; }
    .cat-tab:hover{ color:var(--ink); border-color:var(--faint); }
    .cat-tab.active{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700; }
    .fam{ border:1px solid var(--line); border-radius:10px; padding:12px 13px; margin-bottom:9px; background:#1b1710; transition:border-color .15s; }
    .fam.has{ border-color:var(--accent); }
    .fam-name{ font-family:var(--display); font-size:15px; font-weight:600; margin-bottom:10px; letter-spacing:.01em; }
    .variants{ display:flex; flex-wrap:wrap; gap:8px; }
    .vpill{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line2); background:transparent; border-radius:8px;
      padding:9px 13px; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink); user-select:none; transition:.15s; }
    .vpill:hover{ border-color:var(--accent); }
    .vpill:active{ transform:translateY(1px); }
    .vpill .vp{ color:var(--muted); font-weight:500; font-family:var(--mono); font-size:12px; }
    .vpill.on{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); padding:5px 7px; gap:9px; }
    .vpill.on .vp{ color:var(--accent-ink); }
    .vstep{ display:inline-flex; align-items:center; gap:9px; }
    .vstep button{ width:26px; height:26px; border-radius:6px; border:none; background:rgba(26,20,8,.25); color:var(--accent-ink);
      font-size:16px; font-weight:700; cursor:pointer; line-height:1; display:flex; align-items:center; justify-content:center; }
    .vstep .vq{ min-width:14px; text-align:center; font-weight:700; font-family:var(--mono); }

    .cart-sum{ margin:16px 0 4px; border-top:1px dashed var(--line2); padding-top:12px; }
    .cart-sum .ci{ display:flex; justify-content:space-between; gap:8px; font-size:13px; padding:4px 0; font-family:var(--mono); }
    .cart-sum .ci .x{ color:var(--muted); font-family:'IBM Plex Sans',sans-serif; }
    .cart-grand{ display:flex; justify-content:space-between; font-size:16px; font-weight:700; margin-top:10px; padding-top:10px;
      border-top:1px solid var(--line2); font-family:var(--mono); }
    .cart-grand span:first-child{ font-family:'IBM Plex Sans',sans-serif; }
    .cart-grand span:last-child{ color:var(--accent); }
    .cart-empty{ font-size:13px; color:var(--faint); text-align:center; padding:12px 0; }

    .paste-details{ margin-top:14px; border:1px solid var(--line); border-radius:9px; padding:0 13px; }
    .paste-details summary{ cursor:pointer; padding:12px 0; font-size:13px; font-weight:600; color:var(--muted); list-style:none; display:flex; align-items:center; gap:7px; }
    .paste-details summary::-webkit-details-marker{ display:none; }
    .paste-details[open] summary{ color:var(--accent); }
    .paste-details textarea{ margin-bottom:10px; }
    .paste-box{ background:#181510; }

    .chips{ display:flex; gap:7px; overflow-x:auto; padding-bottom:5px; margin-bottom:14px; }
    .chip{ flex-shrink:0; padding:8px 13px; border-radius:7px; border:1px solid var(--line2); background:transparent;
      font-family:var(--mono); font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; white-space:nowrap; text-transform:uppercase; letter-spacing:.04em; transition:.15s; }
    .chip:hover{ color:var(--ink); }
    .chip.active{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700; }
    .chip .n{ opacity:.7; margin-left:5px; }

    .ocard{ background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--new); border-radius:10px; padding:14px; margin-bottom:11px; transition:border-color .15s; }
    .ocard:hover{ border-color:var(--line2); }
    .ocard[data-status=packed]{ border-left-color:var(--packed); }
    .ocard[data-status=dispatched]{ border-left-color:var(--dispatched); }
    .ocard[data-status=delivered]{ border-left-color:var(--delivered); opacity:.68; }
    .ochead{ display:flex; justify-content:space-between; align-items:center; gap:8px; padding-bottom:10px; margin-bottom:8px; border-bottom:1px dashed var(--line2); }
    .ono{ font-family:var(--mono); font-weight:700; font-size:14px; letter-spacing:.02em; }
    .otime{ font-family:var(--mono); font-size:10.5px; color:var(--faint); }
    .pill{ font-family:var(--mono); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; padding:3px 8px; border-radius:5px; border:1px solid transparent; color:#fff; }
    .pill.new{ background:rgba(138,129,114,.16); color:#c8bfae; border-color:rgba(138,129,114,.4); }
    .pill.packed{ background:rgba(245,165,36,.15); color:#f5a524; border-color:rgba(245,165,36,.5); }
    .pill.dispatched{ background:rgba(90,162,232,.15); color:#7fbcff; border-color:rgba(90,162,232,.5); }
    .pill.delivered{ background:rgba(63,185,106,.15); color:#5fd08a; border-color:rgba(63,185,106,.5); }
    .board-banner{ background:rgba(229,72,77,.1); color:#f0868a; border:1px solid rgba(229,72,77,.3); border-radius:8px; padding:10px 13px; font-size:13px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:7px; }
    .ocust{ margin:2px 0 3px; font-weight:600; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .ocust .rb{ font-family:var(--mono); font-size:11px; color:#eab98c; font-weight:500; display:inline-flex; align-items:center; gap:4px; }
    .oitems{ font-size:13px; color:var(--ink); margin:6px 0; }
    .oitems .it{ display:flex; justify-content:space-between; gap:8px; padding:2px 0; }
    .oitems .it span:last-child{ font-family:var(--mono); color:var(--muted); }
    .onote{ font-size:13px; font-weight:500; color:#f3cd97; background:rgba(245,165,36,.09); border:1px solid rgba(245,165,36,.25);
      border-radius:7px; padding:7px 10px; margin:7px 0; display:flex; align-items:center; gap:6px; }
    .ocourier{ font-size:12px; color:var(--muted); margin:5px 0; display:flex; align-items:center; gap:6px; }
    .ofoot{ display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
    .ototal{ font-family:var(--mono); font-weight:700; font-size:16px; }
    .paidflag{ font-family:var(--mono); font-size:11px; font-weight:500; padding:4px 9px; border-radius:5px; cursor:pointer; text-transform:uppercase; letter-spacing:.04em; }
    .paidflag.yes{ background:rgba(63,185,106,.14); color:#5fd08a; border:1px solid rgba(63,185,106,.35); }
    .paidflag.no{ background:rgba(229,72,77,.12); color:#f0868a; border:1px solid rgba(229,72,77,.35); }
    .oactions{ display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }
    .empty{ text-align:center; color:var(--faint); padding:34px 10px; font-size:14px; }

    .modal{ display:none; position:fixed; inset:0; z-index:50; background:rgba(10,8,4,.8); align-items:center; justify-content:center; padding:20px; }
    .modal.open{ display:flex; }
    .modal-box{ background:var(--surface); border:1px solid var(--line2); border-radius:14px; padding:22px; max-width:340px; width:100%; text-align:center; }
    .modal-box img{ width:100%; max-width:260px; border-radius:10px; background:#fff; padding:8px; }
    .modal-box h3{ margin:0 0 4px; font-family:var(--display); font-size:17px; }
    .phonepe{ font-family:var(--mono); font-size:26px; font-weight:700; color:var(--accent); letter-spacing:1px; margin:12px 0; }

    .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#2a241a; border:1px solid var(--line2);
      color:var(--ink); padding:11px 20px; border-radius:8px; font-size:13px; font-weight:600; opacity:0; transition:all .25s; z-index:99; pointer-events:none; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    /* app navigation */
    .hgroup{ display:flex; align-items:center; gap:11px; }
    .menu-btn{ width:36px; height:36px; border:1px solid var(--line2); background:transparent; border-radius:8px; color:var(--ink);
      display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
    .menu-btn:hover{ border-color:var(--accent); color:var(--accent); }
    .menu-btn .ic{ width:19px; height:19px; }
    .drawer{ display:none; position:fixed; inset:0; z-index:60; background:rgba(5,4,2,.62); }
    .drawer.open{ display:block; }
    .drawer-panel{ position:absolute; top:0; left:0; bottom:0; width:252px; max-width:82vw; background:#1b1710;
      border-right:1px solid var(--line2); padding:18px 14px; display:flex; flex-direction:column; gap:3px; }
    .drawer-brand{ font-family:var(--display); text-transform:uppercase; letter-spacing:.12em; font-weight:700; color:var(--accent); font-size:14px; margin:2px 8px 16px; }
    .nav-item{ display:flex; align-items:center; gap:11px; width:100%; text-align:left; background:transparent; border:none;
      color:var(--ink); font-family:inherit; font-size:15px; font-weight:600; padding:12px 12px; border-radius:9px; cursor:pointer; }
    .nav-item:hover{ background:rgba(255,255,255,.05); }
    .nav-item.on{ background:var(--accent); color:var(--accent-ink); }
    .nav-item .ic{ width:18px; height:18px; }
    .nav-sep{ height:1px; background:var(--line); margin:9px 8px; }
    .page{ display:none; }
    .page.active{ display:block; }
    .fab{ position:fixed; right:18px; bottom:22px; z-index:40; height:52px; padding:0 22px; border-radius:26px; border:none;
      background:var(--accent); color:var(--accent-ink); font-family:inherit; font-weight:700; font-size:15px;
      display:flex; align-items:center; gap:8px; cursor:pointer; box-shadow:0 8px 24px rgba(0,0,0,.45); }
    .fab .ic{ width:18px; height:18px; }
    @media (prefers-reduced-motion: reduce){ *{ transition:none!important; animation:none!important; } }

  </style>
</head>
<body>
  <header>
    <div class="hgroup">
      <button id="menuBtn" class="menu-btn" aria-label="Open menu"></button>
      <h1 id="brandTitle">Sundays Orders</h1>
    </div>
    <div class="stats" id="headStats"></div>
  </header>

  <div id="drawer" class="drawer">
    <nav class="drawer-panel">
      <div class="drawer-brand">Sundays</div>
      <button class="nav-item" data-page="new">New Order</button>
      <button class="nav-item" data-page="orders">Orders</button>
      <button class="nav-item" data-page="customers">Customers</button>
      <button class="nav-item" data-page="pnl">P&amp;L</button>
      <div class="nav-sep"></div>
      <button class="nav-item" id="exportBtn">Backup (JSON)</button>
      <button class="nav-item" id="importBtn">Restore</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </nav>
  </div>

  <main>
    <!-- NEW ORDER -->
    <section id="page-new" class="page panel">
      <h2>New Order</h2>
      <label for="custName">Customer</label>
      <input type="text" id="custName" placeholder="Name" autocomplete="off" />
      <input type="tel" id="custPhone" placeholder="WhatsApp number" autocomplete="off" style="margin-top:8px" />
      <div class="repeat-badge" id="repeatBadge"></div>

      <label style="margin-top:14px">Items <span style="font-weight:600;color:var(--muted)">(tap a size to add)</span></label>
      <input type="text" id="search" placeholder="Search — e.g. peri, nutella, ragi…" autocomplete="off" />
      <div class="cat-tabs" id="catTabs"></div>
      <div id="catalog"></div>
      <div class="cart-sum" id="cartSummary"></div>

      <label for="orderNote" style="margin-top:14px">Note (less salt / less sugar / gift wrap…)</label>
      <textarea id="orderNote" placeholder="Any special request"></textarea>

      <details class="paste-details">
        <summary id="pasteSummary">Paste a WhatsApp order instead (optional)</summary>
        <textarea id="pasteBox" class="paste-box" placeholder="Works best when the customer sent name, number & items in one message"></textarea>
        <button class="btn block ghost sm" id="fillPaste">Fill from paste</button>
      </details>

      <button class="btn block green" id="saveOrder" style="margin-top:14px">Save Order</button>
    </section>

    <!-- BOARD (Orders / Customers / P&L) -->
    <section id="page-board" class="page">
      <div class="chips" id="chips"></div>
      <div id="board"></div>
    </section>
  </main>

  <button id="fab" class="fab" aria-label="New order"></button>

  <!-- Payment modal -->
  <div class="modal" id="payModal">
    <div class="modal-box">
      <h3 id="payTitle">Collect Payment</h3>
      <p style="font-size:13px;color:var(--muted);margin:2px 0 10px" id="paySub"></p>
      <div id="payQrWrap"><img id="payQr" alt="UPI QR" /></div>
      <div class="phonepe" id="payPhonePe" style="display:none"></div>
      <button class="btn block ghost" style="margin-top:12px" onclick="closePay()">Close</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>

    function normalizeText(value) {
      return String(value || "").toLowerCase()
        .replace(/&/g, " and ")
        .replace(/\bhalf[\s-]*kg\b/g, "500g")
        .replace(/\bone[\s-]*kg\b/g, "1kg")
        .replace(/\b(\d+)\s*(?:kilograms?|kilos?|kilo|kg)\b/g, "$1kg")
        .replace(/\b(\d+)\s*(?:grams?|gms?|gm|g)\b/g, "$1g")
        .replace(/\bperi[\s-]*peri\b/g, "peri peri")
        .replace(/\bperiperi\b/g, "peri peri")
        .replace(/\bperiberry\b/g, "peri peri")
        .replace(/\bmashala\b/g, "chilli (masala)")
        .replace(/\bmasala\b/g, "chilli (masala)")
        .replace(/\bchilli\b/g, "chilli (masala)")
        .replace(/[₹,().:/_-]/g, " ")
        .replace(/\s+/g, " ").trim();
    }
    function containsPhrase(text, phrase) {
      const escaped = phrase.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return new RegExp(`(?:^|[^a-z0-9])${escaped}s?(?:[^a-z0-9]|$)`).test(text);
    }
    function aliasesForProduct(product) {
      return [product.name, product.id.replace(/-/g, " "), ...(ALIASES_BY_ID[product.id] || [])]
        .map(normalizeText).filter(Boolean).sort((a, b) => b.length - a.length);
    }
    function quantityFromSegment(text) {
      const afterX = text.match(/(?:^|[^a-z0-9])(?:x|\*)\s*(\d{1,3})(?![a-z0-9])(?:[^a-z0-9]|$)/);
      if (afterX) return cleanNumber(afterX[1]);
      const leading = text.match(/^\s*(\d{1,3})(?![a-z0-9])(?:\s|$)/);
      if (leading) return cleanNumber(leading[1]);
      const trailing = text.match(/(?:^|[^a-z0-9])(\d{1,3})(?![a-z0-9])\s*$/);
      if (trailing) return cleanNumber(trailing[1]);
      return 1;
    }
    function orderSegments(message) {
      // Only split when a WEIGHT token (500g/1kg/etc, not a bare count) precedes a product,
      // so qty-prefix orders like "2 peri peri 250g" stay intact and keep their quantity.
      const qtyWeightPattern = /\b(\d+\s*(?:g|kg|pcs|pieces|box)|half\s*kg|one\s*kg|1\s*kg|500\s*g|250\s*g)\s+(?=(?:cashew|kaju|laddu|ladoo|laddoo|cookie|bites|combo|container|borugumuddalu|sununda|sunnunda|urad|premium|jumbo|traditional|sesame|dry|ragi|plain|roasted|peri|chilli|trio|dozen|storage|airtight|sunday|starter|gift|box|full|tub|nutella|white|classic|oreo|atta|explorer|signature|family|party)\b)/ig;
      const pre = String(message || "").replace(qtyWeightPattern, "$1\n");
      const raw = pre.split(/\n|,|;|\s+\band\b\s+/i).map(normalizeText).filter(Boolean);
      const result = [];
      const onlyQty = /^(?:\d+\s*(?:g|kg|pcs|pieces|box)?|half\s*kg|one\s*kg|1\s*kg|500\s*g|250\s*g|x\s*\d+|\d+)$/i;
      for (const seg of raw) {
        const t = seg.trim();
        if (!t) continue;
        if (onlyQty.test(t)) {
          if (result.length && !onlyQty.test(result[result.length - 1])) result[result.length - 1] += " " + t;
          else result.push(t);
        } else {
          if (result.length && onlyQty.test(result[result.length - 1])) result[result.length - 1] += " " + t;
          else result.push(t);
        }
      }
      return result;
    }
    function parseMetadataFromMessage(message) {
      const result = { name: "", phone: "", address: "" };
      if (!message) return result;
      const lines = message.split("\n").map((l) => l.trim());
      const phoneMatch = message.match(/(?:\+?91|0)?[-\s]?([6-9]\d{4}[-\s]?\d{5})\b/);
      if (phoneMatch) result.phone = phoneMatch[1].replace(/[-\s]/g, "");
      const nameRegexes = [/^(?:customer\s*)?name\s*[:|-]\s*(.+)$/i, /^deliver\s*to\s*[:|-]\s*(.+)$/i, /^to\s*[:|-]\s*(.+)$/i, /^(?:customer)\s*[:|-]\s*(.+)$/i];
      for (const line of lines) {
        for (const rx of nameRegexes) { const m = line.match(rx); if (m) { result.name = m[1].trim(); break; } }
        if (result.name) break;
      }
      function isProductLine(line) {
        if (!line) return false;
        if (/^(?:\d+[.)]|-|\*)\s+/i.test(line)) return true;
        if (/(?:x|\*)\s*\d+/i.test(line)) return true;
        const lower = line.toLowerCase();
        return ["cashew", "kaju", "laddu", "ladoo", "cookie", "bites", "combo", "container", "borugumuddalu", "sununda"].some((k) => lower.includes(k));
      }
      let addrStart = -1;
      const addrRx = [/^(?:delivery\s*)?address\s*[:|-]/i, /^location\s*[:|-]/i, /^addr\s*[:|-]/i];
      for (let i = 0; i < lines.length; i++) { if (addrRx.some((rx) => rx.test(lines[i]))) { addrStart = i; break; } }
      if (addrStart !== -1) {
        const addr = [];
        const first = lines[addrStart].replace(/^(?:delivery\s*)?address\s*[:|-]\s*/i, "").replace(/^location\s*[:|-]\s*/i, "").replace(/^addr\s*[:|-]\s*/i, "").trim();
        if (first) addr.push(first);
        for (let i = addrStart + 1; i < lines.length; i++) {
          const line = lines[i];
          if (!line) break;
          if (/^(?:items|order|products|qty)\b/i.test(line)) break;
          if (isProductLine(line)) break;
          addr.push(line);
        }
        result.address = addr.join(", ");
      } else {
        const pin = message.match(/\b(500\d{3})\b/);
        if (pin) {
          const pinIdx = lines.findIndex((l) => l.includes(pin[1]));
          if (pinIdx !== -1) {
            const addr = [];
            for (let i = Math.max(0, pinIdx - 2); i <= Math.min(lines.length - 1, pinIdx + 1); i++) {
              const line = lines[i];
              if (/^(?:name|phone|mobile|tel|items|order)\b/i.test(line)) continue;
              if ((result.phone && line.includes(result.phone)) || (result.name && line.includes(result.name))) continue;
              if (isProductLine(line)) continue;
              addr.push(line);
            }
            result.address = addr.join(", ");
          }
        }
      }
      return result;
    }
    // Parse a pasted WhatsApp message -> {name, phone, address, qtyById}
    function parseOrderIntoCart(message) {
      const meta = parseMetadataFromMessage(message);
      const qtyById = {};
      const text = normalizeText(message);
      if (text) {
        for (const segment of orderSegments(message)) {
          // Pick the best-fitting product: score = total length of ALL aliases it matches in
          // this segment. "half dozen oreo" -> dozen-oreo (matches "half dozen"+"oreo") beats
          // dozen-doublechoc (only "half dozen"). Ties keep the earlier CATALOG entry
          // (base variant before its atta swap).
          let best = null, bestScore = 0;
          for (const product of CATALOG) {
            const matched = aliasesForProduct(product).filter((a) => containsPhrase(segment, a));
            if (!matched.length) continue;
            if (product.flavor) {
              const hasFlavor = /(?:peri|chilli|masala|plain)/i.test(segment);
              if (hasFlavor && !containsPhrase(segment, normalizeText(product.flavor))) continue;
            }
            if (product.weight) {
              const hasWeight = /\b\d+\s*(?:g|kg)\b/i.test(segment);
              if (hasWeight && !containsPhrase(segment, normalizeText(product.weight))) continue;
            }
            const score = matched.reduce((s, a) => s + a.length, 0);
            if (score > bestScore) { bestScore = score; best = product; }
          }
          if (best) {
            const qty = quantityFromSegment(segment);
            if (qty > 0) qtyById[best.id] = qty;
          }
        }
      }
      return { name: meta.name, phone: meta.phone, address: meta.address, qtyById };
    }

    function waUrl(phone, text) {
      const clean = String(phone || "").replace(/\D/g, "");
      const p = clean.length === 10 ? "91" + clean : clean;
      return (p ? "https://wa.me/" + p : "https://wa.me/") + "?text=" + encodeURIComponent(text);
    }
    function fmtTime(ts) {
      return new Date(ts).toLocaleString("en-IN", { day: "numeric", month: "short", hour: "numeric", minute: "2-digit" });
    }
    function isToday(ts) {
      const d = new Date(ts), n = new Date();
      return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
    }
    let toastTimer;
    function showToast(msg) {
      const t = $("toast"); t.textContent = msg; t.classList.add("show");
      clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
    }

    /* ---------- state ---------- */
    let orders = load();
    let cart = {};              // productId -> qty (new-order form)
    let activeFilter = "active"; // active | today | all | <stage>

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }

    function nextOrderNo() {
      const n = parseInt(localStorage.getItem(COUNTER_KEY) || "0", 10) + 1;
      localStorage.setItem(COUNTER_KEY, String(n));
      return "ORD-" + String(n).padStart(4, "0");

    // repeat customer: count of PRIOR orders sharing the phone
    function repeatCount(phone) {
      const p = norm10(phone);
      if (p.length < 10) return 0;
      return orders.filter((o) => norm10(o.customerPhone) === p).length;
    }

    /* ---------- new-order catalog picker ---------- */

    const CATEGORIES = ["Tubs", "Cashews", "Laddus", "Cookies", "Combos", "Snacks"];

    let catFilter = "All";

    /* ---------- cost / margin engine (seeded from SUNDAYS_Master_Product_Costing) ---------- */
    // Cost PRICE per SKU (ingredients + packaging + batch overhead already folded in, per the doc).
    // Some marked *est* where the doc gave a range or didn't list the exact SKU — editable via P&L screen.
    // Cost prices are PRIVATE — not shipped in this (public) file. Load yours once via menu → Restore.
    const COST_SEED = {};
    const COST_KEY = "sundays.costs.v1", OVERHEAD_KEY = "sundays.overhead.v1";
    let COSTS = loadCosts();               // seed merged with any user edits
    function loadCosts() {
      let saved = {}; try { saved = JSON.parse(localStorage.getItem(COST_KEY)) || {}; } catch {}
      return Object.assign({}, COST_SEED, saved);
    }
    const costOf = (id) => Number(COSTS[id] || 0);
    const orderCost = (o) => (o.items || []).reduce((s, it) => s + costOf(it.id) * Number(it.qty), 0);
    const orderProfit = (o) => o.total - orderCost(o);
    const monthlyOverhead = () => Number(localStorage.getItem(OVERHEAD_KEY) || 0);

    function renderCatalog() {
      const q = $("search").value.trim().toLowerCase();
      $("catTabs").innerHTML = ["All"].concat(CATEGORIES).map((c) =>
        '<div class="cat-tab' + (catFilter === c ? " active" : "") + '" data-cat="' + c + '">' + c + "</div>").join("");

      FAMILIES.forEach((fam) => {
        if (catFilter !== "All" && fam.cat !== catFilter) return;
        if (q) {
          const hay = (fam.name + " " + fam.cat + " " + fam.items.map((i) => i[1]).join(" ")).toLowerCase();
          if (!hay.includes(q)) return;
        }
        const has = fam.items.some((i) => cart[i[0]] > 0);
        html += '<div class="fam' + (has ? " has" : "") + '"><div class="fam-name">' + esc(fam.name) + '</div><div class="variants">';
        fam.items.forEach(([id, label]) => {
          const price = formatMoney(CAT_BY_ID[id].price);
          const qty = cart[id] || 0;
          const lbl = label ? esc(label) + " " : "";
          if (qty > 0) {
            html += '<span class="vpill on"><span class="vstep">' +
              '<button data-dec="' + id + '" aria-label="remove one">−</button>' +
              '<span class="vq">' + qty + '</span>' +
              '<button data-inc="' + id + '" aria-label="add one">+</button></span>' +
              '<span>' + lbl + price + '</span></span>';

            html += '<button class="vpill" data-inc="' + id + '">' + lbl + '<span class="vp">' + price + '</span></button>';
          }
        });

      $("catalog").innerHTML = html || '<div class="empty">No item matches “' + esc($("search").value.trim()) + '”.</div>';

    function renderCartSummary() {
      const items = cartItems();
      if (!items.length) { $("cartSummary").innerHTML = '<div class="cart-empty">No items yet — tap a size above.</div>'; return; }
      let html = items.map((it) => {
        const meta = [it.flavor, it.weight].filter(Boolean).join(" ");
        return '<div class="ci"><span>' + it.qty + "× " + esc(it.name) +
          (meta ? ' <span class="x">' + esc(meta) + "</span>" : "") + "</span><span>" + formatMoney(it.price * it.qty) + "</span></div>";
      }).join("");
      html += '<div class="cart-grand"><span>Total</span><span>' + formatMoney(cartTotal()) + "</span></div>";
      $("cartSummary").innerHTML = html;
    }
    function cartTotal() {
      return Object.keys(cart).reduce((s, id) => {
        const p = CATALOG.find((x) => x.id === id);
        return s + (p ? p.price * cart[id] : 0);
      }, 0);
    }
    function cartItems() {
      return Object.keys(cart).filter((id) => cart[id] > 0).map((id) => {
        const p = CATALOG.find((x) => x.id === id);
        return { id: p.id, name: p.name, flavor: p.flavor, weight: p.weight, price: p.price, qty: cart[id] };
      });
    }

    /* ---------- board ---------- */
    function itemLine(it) {
      const meta = [it.flavor, it.weight].filter(Boolean).join(" ");
      return it.qty + "× " + it.name + (meta ? " (" + meta + ")" : "");
    }
    function renderBoard() {
      const counts = { active: 0, today: 0, all: orders.length, unpaid: 0 };
      STAGES.forEach((s) => (counts[s] = 0));
      let todayRevenue = 0, pending = 0;
      orders.forEach((o) => {
        counts[o.status]++;
        if (o.status !== "delivered") counts.active++;
        if (isToday(o.createdAt)) { counts.today++; todayRevenue += o.total; }
        if (!o.paid) { counts.unpaid++; pending += o.total; }
      });
      const customers = aggregateCustomers();
      counts.customers = customers.length;
      const chipDefs = [
        ["active", "Active"], ["today", "Today"], ["unpaid", "Unpaid"], ["new", "New"],
        ["packed", "Packed"], ["dispatched", "Dispatched"], ["delivered", "Delivered"], ["all", "All"]
      ];
      $("chips").innerHTML = chipDefs.map(([k, lbl]) =>
        '<div class="chip' + (activeFilter === k ? " active" : "") + '" data-filter="' + k + '">' +
        lbl + (k === "pnl" ? "" : '<span class="n">' + (counts[k] || 0) + "</span>") + "</div>").join("");

      if (activeFilter === "pnl") {
        $("board").innerHTML = pnlHtml();
        const oh = $("ohInput");
        if (oh) oh.addEventListener("change", () => { localStorage.setItem(OVERHEAD_KEY, String(cleanNumber(oh.value))); renderBoard(); });
        const g = orders.reduce((s, o) => s + orderProfit(o), 0);
        $("headStats").textContent = "P&L · " + formatMoney(g) + " gross all-time";
        return;
      }

      if (activeFilter === "customers") {
        $("board").innerHTML = customers.length ? customers.map(customerCardHtml).join("") :
          '<div class="empty">No customers with a phone number yet.</div>';
        $("headStats").textContent = customers.length + " customers · " + formatMoney(pending) + " unpaid";
        return;
      }

      let list = orders.slice().sort((a, b) => b.createdAt - a.createdAt);
      if (activeFilter === "active") list = list.filter((o) => o.status !== "delivered");
      else if (activeFilter === "today") list = list.filter((o) => isToday(o.createdAt));
      else if (activeFilter === "unpaid") list = list.filter((o) => !o.paid);
      else if (activeFilter !== "all") list = list.filter((o) => o.status === activeFilter);

      const banner = (activeFilter === "unpaid" && counts.unpaid)
        ? '<div class="board-banner">' + icon("wallet") + " " + formatMoney(pending) + " pending from " + counts.unpaid + " order" + (counts.unpaid > 1 ? "s" : "") + "</div>"
        : "";
      $("board").innerHTML = banner + (list.length ? list.map(cardHtml).join("") :
        '<div class="empty">No orders here yet.</div>');
      $("headStats").textContent = counts.active + " active · " + formatMoney(todayRevenue) + " today · " + formatMoney(pending) + " unpaid";
    }

    function cardHtml(o) {
      const rc = repeatCount(o.customerPhone);
      const repeat = rc > 1 ? '<span class="rb">' + icon("repeat") + " Repeat ×" + rc + "</span>" : "";
      const items = o.items.map((it) =>
        '<div class="it"><span>' + esc(itemLine(it)) + "</span><span>" + formatMoney(it.price * it.qty) + "</span></div>").join("");
      const note = o.note ? '<div class="onote">' + icon("note") + " " + esc(o.note) + "</div>" : "";
      const courier = o.courier ? '<div class="ocourier">' + icon("truck") + " " + esc(o.courier) + "</div>" : "";
      let primary = "";
      if (o.status === "new") primary = '<button class="btn sm" style="background:var(--packed)" data-adv="' + o.id + '">' + icon("check") + ' Mark Packed</button>';
      else if (o.status === "packed") primary = '<button class="btn sm blue" data-dispatch="' + o.id + '">' + icon("truck") + ' Message + Dispatch</button>';
      else if (o.status === "dispatched") primary = '<button class="btn sm green" data-adv="' + o.id + '">' + icon("package") + ' Mark Delivered</button>';

      return '<div class="ocard" data-status="' + o.status + '">' +
        '<div class="ochead"><div><span class="ono">' + esc(o.orderNo) + '</span> ' +
          '<span class="otime">' + fmtTime(o.createdAt) + '</span></div>' +
          '<span class="pill ' + o.status + '">' + STAGE_LABEL[o.status] + '</span></div>' +
        '<div class="ocust">' + esc(o.customerName || "—") + repeat + '</div>' +
        '<div class="oitems">' + items + '</div>' + note + courier +
        '<div class="ofoot"><span class="ototal">' + formatMoney(o.total) + '</span>' +
          '<span class="paidflag ' + (o.paid ? "yes" : "no") + '" data-paid="' + o.id + '">' +
          (o.paid ? "✓ Paid" : "Unpaid — tap") + '</span></div>' +
        '<div class="oactions">' + primary +
          '<button class="btn sm ghost" data-wa="' + o.id + '">' + icon("message") + ' WhatsApp</button>' +
          '<button class="btn sm ghost" data-pay="' + o.id + '">' + icon("wallet") + ' Collect</button>' +
          '<button class="btn sm ghost" data-del="' + o.id + '" style="color:var(--red)">' + icon("trash") + '</button>' +
        '</div></div>';
    }

    /* ---------- customers (retention view) ---------- */
    // Group orders by phone -> per-customer spend, count, recency, favourite item.
    function aggregateCustomers() {
      const map = {};
      orders.forEach((o) => {
        const p = norm10(o.customerPhone);
        if (p.length < 10) return; // no phone -> can't re-engage, skip
        const c = map[p] || (map[p] = { phone: p, name: "", count: 0, spent: 0, last: 0, favMap: {} });
        c.count++; c.spent += o.total;
        if (o.createdAt >= c.last) { c.last = o.createdAt; if (o.customerName) c.name = o.customerName; }
        if (!c.name && o.customerName) c.name = o.customerName;
        (o.items || []).forEach((it) => {
          const key = [it.name, it.flavor, it.weight].filter(Boolean).join(" ");
          c.favMap[key] = (c.favMap[key] || 0) + Number(it.qty);
        });
      });
      return Object.keys(map).map((k) => {
        const c = map[k];
        let fav = "", favQty = 0;
        Object.keys(c.favMap).forEach((n) => { if (c.favMap[n] > favQty) { favQty = c.favMap[n]; fav = n; } });
        c.fav = fav;
        return c;
      }).sort((a, b) => b.last - a.last);
    }

    function customerCardHtml(c) {
      const days = Math.floor((Date.now() - c.last) / 86400000);
      const ago = days <= 0 ? "today" : days === 1 ? "yesterday" : days + " days ago";
      const stale = days > 30;
      const repeat = c.count > 1
        ? '<span class="pill" style="background:var(--brand)">' + icon("repeat") + " " + c.count + ' orders</span>'
        : '<span class="pill" style="background:var(--new)">1 order</span>';
      return '<div class="ocard" style="border-left-color:var(--brand)">' +
        '<div class="ochead"><div class="ono">' + icon("user") + " " + esc(c.name || "(no name)") + '</div>' + repeat + '</div>' +
        '<div class="ocust">' + icon("phone") + " " + esc(c.phone) + '</div>' +
        '<div class="oitems"><div class="it"><span>' + icon("wallet") + ' Total spent</span><span>' + formatMoney(c.spent) + '</span></div>' +
          (c.fav ? '<div class="it"><span>' + icon("star") + ' Favourite</span><span>' + esc(c.fav) + '</span></div>' : '') + '</div>' +
        '<div class="ocourier"' + (stale ? ' style="color:var(--red);font-weight:800"' : '') + '>' + icon("clock") + ' Last order: ' + ago + (stale ? " — nudge them!" : "") + '</div>' +
        '<div class="oactions">' +
          '<button class="btn sm blue" data-cmsg="' + esc(c.phone) + '" data-cfav="' + esc(c.fav) + '" data-cname="' + esc(c.name) + '">' + icon("message") + ' Send a nudge</button>' +
        '</div></div>';
    }

    /* ---------- P&L / margins ---------- */
    function pnlHtml() {
      if (!orders.length) return '<div class="empty">No orders yet — your P&amp;L, margins and profit-by-item appear here once you save orders.</div>';
      const now = new Date();
      const per = (fn) => { let rev = 0, cost = 0, n = 0; orders.filter(fn).forEach((o) => { rev += o.total; cost += orderCost(o); n++; }); return { rev, cost, gross: rev - cost, margin: rev ? (rev - cost) / rev * 100 : 0, n }; };
      const T = per((o) => isToday(o.createdAt));
      const M = per((o) => { const d = new Date(o.createdAt); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
      const A = per(() => true);
      const oh = monthlyOverhead(), net = M.gross - oh;
      const card = (lbl, s) => '<div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px">' +
        '<div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700">' + lbl + '</div>' +
        '<div style="font-size:20px;font-weight:800;margin:6px 0 2px;color:var(--accent2);font-variant-numeric:tabular-nums">' + formatMoney(s.gross) + '</div>' +
        '<div style="font-size:11px;color:var(--muted)">' + Math.round(s.margin) + '% margin · ' + s.n + ' order' + (s.n === 1 ? '' : 's') + '</div>' +
        '<div style="font-size:11px;color:var(--faint);margin-top:4px;font-variant-numeric:tabular-nums">Rev ' + formatMoney(s.rev) + ' · Cost ' + formatMoney(s.cost) + '</div></div>';
      const agg = {};
      orders.forEach((o) => o.items.forEach((it) => {
        const a = agg[it.id] || (agg[it.id] = { name: [it.name, it.flavor, it.weight].filter(Boolean).join(' '), qty: 0, rev: 0, cost: 0 });
        a.qty += it.qty; a.rev += it.price * it.qty; a.cost += costOf(it.id) * it.qty;
      }));
      const items = Object.values(agg).map((a) => ({ ...a, profit: a.rev - a.cost, margin: a.rev ? (a.rev - a.cost) / a.rev * 100 : 0 })).sort((x, y) => y.profit - x.profit);
      const mcol = (m) => m < 20 ? 'var(--red)' : m < 40 ? 'var(--amber)' : 'var(--green)';
      const rows = items.map((a) => '<div class="it" style="padding:6px 0;border-bottom:1px solid var(--line)"><span>' + a.qty + '× ' + esc(a.name) + '</span>' +
        '<span style="font-variant-numeric:tabular-nums">' + formatMoney(a.profit) + ' <span style="color:' + mcol(a.margin) + ';font-weight:700">' + Math.round(a.margin) + '%</span></span></div>').join('');
      const brk = orders.slice().sort((a, b) => b.createdAt - a.createdAt).map((o) => {
        const c = orderCost(o), p = o.total - c, mg = o.total ? Math.round(p / o.total * 100) : 0, rep = repeatCount(o.customerPhone) > 1;
        const meta = o.items.map((it) => { const m = [it.flavor, it.weight].filter(Boolean).join(' '); return it.qty + '× ' + it.name + (m ? ' (' + m + ')' : ''); }).join(', ');
        return '<div style="border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:8px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">' +
            '<span><span class="ono">' + esc(o.orderNo) + '</span> · ' + esc(o.customerName || '—') + '</span>' +
            '<span class="pill" style="' + (rep ? 'background:rgba(194,112,58,.16);color:#eab98c;border-color:rgba(194,112,58,.4)' : 'background:rgba(138,129,114,.16);color:#c8bfae;border-color:rgba(138,129,114,.4)') + '">' + (rep ? 'REPEAT' : 'NEW') + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;gap:6px;font-family:var(--mono);font-size:12px;margin-top:9px">' +
            '<span style="color:var(--muted)">Rev ' + formatMoney(o.total) + '</span>' +
            '<span style="color:var(--muted)">Cost ' + formatMoney(c) + '</span>' +
            '<span style="color:var(--green)">+' + formatMoney(p) + '</span>' +
            '<span style="color:' + mcol(mg) + ';font-weight:700">' + mg + '%</span></div>' +
          '<div style="font-size:12px;color:var(--faint);margin-top:6px">' + esc(meta) + '</div></div>';
      }).join('');
      return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px">' +
          card('Today', T) + card('This month', M) + card('All time', A) + '</div>' +
        '<div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px">' +
          '<div class="fam-name" style="margin-bottom:10px">Orders — new vs repeat · per-order breakdown</div>' + brk + '</div>' +
        '<div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px">' +
          '<div class="fam-name">Net profit — this month</div>' +
          '<label>Monthly fixed costs (rent · gas · power · ads…)</label>' +
          '<input id="ohInput" type="number" inputmode="numeric" value="' + (oh || '') + '" placeholder="e.g. 15000" />' +
          '<div style="display:flex;justify-content:space-between;margin-top:12px;font-weight:800;font-size:16px"><span>Net (gross − fixed)</span>' +
          '<span style="color:' + (net >= 0 ? 'var(--green)' : 'var(--red)') + ';font-variant-numeric:tabular-nums">' + formatMoney(net) + '</span></div>' +
          (oh ? '' : '<div style="font-size:11px;color:var(--faint);margin-top:6px">Enter your monthly fixed costs to see true net profit.</div>') + '</div>' +
        '<div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px">' +
          '<div class="fam-name" style="margin-bottom:8px">Profit by item — all time</div>' +
          '<div class="oitems">' + rows + '</div>' +
          '<div style="font-size:11px;color:var(--faint);margin-top:10px">Costs seeded from your master costing sheet (some estimated). Margin colour: red &lt;20% · amber &lt;40% · green ≥40%.</div></div>';
    }

    /* ---------- actions ---------- */
    function findOrder(id) { return orders.find((o) => o.id === id); }
    function advance(id) {
      const o = findOrder(id); if (!o) return;
      const i = STAGES.indexOf(o.status);
      if (i < STAGES.length - 1) {
        o.status = STAGES[i + 1];
        o.statusLog.push({ status: o.status, at: Date.now() });
        save(); renderBoard(); showToast(o.orderNo + " → " + STAGE_LABEL[o.status]);
      }
    }
    function dispatchOrder(id) {
      const o = findOrder(id); if (!o) return;
      const msg = "Namaste " + (o.customerName || "") + " andi 🍪\n" +
        "Your Sundays order " + o.orderNo + " is ready! 🎉\n" +
        "Booking your Rapido / parcel now — will share details shortly.\n" +
        "Total: " + formatMoney(o.total) + (o.paid ? " (paid ✓)" : " — pay via UPI andi 🙏");
      window.open(waUrl(o.customerPhone, msg), "_blank");
      const courier = prompt("Courier / tracking note (e.g. Rapido - rider 98xxxxxxx):", o.courier || "");
      if (courier !== null) o.courier = courier.trim();
      o.status = "dispatched";
      o.statusLog.push({ status: "dispatched", at: Date.now() });
      save(); renderBoard(); showToast(o.orderNo + " dispatched");
    }
    function openWa(id) {
      const o = findOrder(id); if (!o) return;
      const msg = "Namaste " + (o.customerName || "") + " andi 🍪 — regarding your Sundays order " + o.orderNo + ".";
      window.open(waUrl(o.customerPhone, msg), "_blank");
    }
    function togglePaid(id) {
      const o = findOrder(id); if (!o) return;
      o.paid = !o.paid; save(); renderBoard();
      showToast(o.orderNo + (o.paid ? " marked paid" : " marked unpaid"));
    }
    function openPay(id) {
      const o = findOrder(id); if (!o) return;
      const usePhonePe = o.total >= PHONEPE_THRESHOLD;
      $("paySub").textContent = o.orderNo + " · " + formatMoney(o.total);
      if (usePhonePe) {
        $("payTitle").textContent = "Pay via PhonePe";
        $("payQrWrap").style.display = "none";
        $("payPhonePe").style.display = "block";
        $("payPhonePe").textContent = PHONEPE_NUMBER;
      } else {
        $("payTitle").textContent = "Scan to Pay (UPI)";
        $("payQrWrap").style.display = "block";
        $("payPhonePe").style.display = "none";
        $("payQr").src = UPI_QR_IMAGE;
      }
      $("payModal").classList.add("open");
    }
    function closePay() { $("payModal").classList.remove("open"); }
    function delOrder(id) {
      const o = findOrder(id); if (!o) return;
      if (!confirm("Delete " + o.orderNo + " (" + (o.customerName || "") + ")?")) return;
      orders = orders.filter((x) => x.id !== id);
      save(); renderBoard(); showToast(o.orderNo + " deleted");
    }

    function saveOrder() {
      const items = cartItems();
      if (!items.length) { showToast("Add at least one item"); return; }
      const o = {
        id: makeId(), orderNo: nextOrderNo(), createdAt: Date.now(),
        customerName: $("custName").value.trim(),
        customerPhone: $("custPhone").value.trim(),
        items: items, total: orderTotal(items),
        note: $("orderNote").value.trim(),
        status: "new", paid: false, courier: "",
        statusLog: [{ status: "new", at: Date.now() }]
      };
      orders.push(o); save();
      // reset form
      cart = {}; $("custName").value = ""; $("custPhone").value = "";
      $("orderNote").value = ""; $("search").value = ""; $("pasteBox").value = "";
      $("repeatBadge").classList.remove("show");
      renderCatalog(); renderBoard();
      showToast(o.orderNo + " saved");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function fillFromPaste() {
      const msg = $("pasteBox").value.trim();
      if (!msg) { showToast("Paste an order first"); return; }
      const r = parseOrderIntoCart(msg);
      if (r.name) $("custName").value = r.name;
      if (r.phone) $("custPhone").value = r.phone;
      if (r.address) {
        const cur = $("orderNote").value.trim();
        if (!cur.includes(r.address)) $("orderNote").value = cur ? cur + "\nAddress: " + r.address : "Address: " + r.address;
      }
      cart = Object.assign({}, r.qtyById);
      renderCatalog();
      $("custPhone").dispatchEvent(new Event("input"));
      const n = Object.keys(r.qtyById).length;
      showToast(n ? "Filled " + n + " item" + (n > 1 ? "s" : "") + " — check & Save" : "No items matched — add manually");
    }

    function exportBackup() {
      const data = JSON.stringify({ orders: orders, counter: localStorage.getItem(COUNTER_KEY) || "0", costs: COSTS, overhead: localStorage.getItem(OVERHEAD_KEY) || "0" }, null, 2);
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([data], { type: "application/json" }));
      a.download = "sundays-orders-" + new Date().toISOString().slice(0, 10) + ".json";
      a.click(); URL.revokeObjectURL(a.href);
      showToast("Backup downloaded");
    }
    function importBackup(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const hasOrders = Array.isArray(data.orders) && data.orders.length > 0;
          if (!hasOrders && !data.costs) throw new Error("bad file");
          // costs/overhead restore without touching existing orders (safe to re-run)
          if (data.costs) { localStorage.setItem(COST_KEY, JSON.stringify(data.costs)); COSTS = loadCosts(); }
          if (data.overhead != null) localStorage.setItem(OVERHEAD_KEY, String(data.overhead));
          if (hasOrders) {
            if (confirm("Restore " + data.orders.length + " orders? This REPLACES all current orders.")) {
              orders = data.orders;
              if (data.counter) localStorage.setItem(COUNTER_KEY, String(data.counter));
              save();
            }
          }
          renderBoard();
          showToast(hasOrders ? "Restored " + data.orders.length + " orders" : "Costs restored");
        } catch { showToast("Invalid backup file"); }
      };
      reader.readAsText(file);
    }

    /* ---------- page navigation ---------- */
    let currentPage = "orders";
    function openDrawer() { $("drawer").classList.add("open"); }
    function closeDrawer() { $("drawer").classList.remove("open"); }
    function showPage(page) {
      currentPage = page;
      $("page-new").classList.toggle("active", page === "new");
      $("page-board").classList.toggle("active", page !== "new");
      document.querySelectorAll(".nav-item[data-page]").forEach((b) => b.classList.toggle("on", b.dataset.page === page));
      $("fab").style.display = page === "new" ? "none" : "";
      if (page !== "new") {
        $("chips").style.display = page === "orders" ? "" : "none";
        if (page === "orders") { if (activeFilter === "customers" || activeFilter === "pnl") activeFilter = "active"; }
        else if (page === "customers") activeFilter = "customers";
        else if (page === "pnl") activeFilter = "pnl";
        renderBoard();
      }
      closeDrawer();
      window.scrollTo(0, 0);
    }

    /* ---------- events ---------- */
    $("menuBtn").addEventListener("click", openDrawer);
    $("fab").addEventListener("click", () => showPage("new"));
    $("drawer").addEventListener("click", (e) => {
      if (e.target.id === "drawer") { closeDrawer(); return; }
      const nav = e.target.closest(".nav-item[data-page]");
      if (nav) showPage(nav.dataset.page);
      else if (e.target.closest("#exportBtn, #importBtn")) closeDrawer();
    });
    $("catalog").addEventListener("click", (e) => {
      const t = e.target.closest("[data-inc],[data-dec]"); if (!t) return;
      const inc = t.dataset.inc, dec = t.dataset.dec;
      if (inc) { cart[inc] = (cart[inc] || 0) + 1; renderCatalog(); }
      else if (dec) { cart[dec] = Math.max(0, (cart[dec] || 0) - 1); if (!cart[dec]) delete cart[dec]; renderCatalog(); }
    });
    $("catTabs").addEventListener("click", (e) => {
      const t = e.target.closest("[data-cat]"); if (!t) return;
      catFilter = t.dataset.cat; renderCatalog();
    });
    $("search").addEventListener("input", renderCatalog);
    $("saveOrder").addEventListener("click", saveOrder);
    $("fillPaste").addEventListener("click", fillFromPaste);
    $("exportBtn").addEventListener("click", exportBackup);
    $("importBtn").addEventListener("click", () => $("importFile").click());
    $("importFile").addEventListener("change", (e) => { if (e.target.files[0]) importBackup(e.target.files[0]); e.target.value = ""; });
    $("custPhone").addEventListener("input", () => {
      const rc = repeatCount($("custPhone").value);
      const b = $("repeatBadge");
      if (rc > 0) { b.innerHTML = icon("repeat") + " Repeat customer — " + rc + " past order" + (rc > 1 ? "s" : ""); b.classList.add("show"); }
      else b.classList.remove("show");
    });
    $("chips").addEventListener("click", (e) => {
      const f = e.target.closest("[data-filter]"); if (!f) return;
      activeFilter = f.dataset.filter; renderBoard();
    });
    $("board").addEventListener("click", (e) => {
      const t = e.target.closest("button, [data-paid]"); if (!t) return;
      const d = t.dataset;
      if (d.adv) advance(d.adv);
      else if (d.dispatch) dispatchOrder(d.dispatch);
      else if (d.wa) openWa(d.wa);
      else if (d.pay) openPay(d.pay);
      else if (d.paid) togglePaid(d.paid);
      else if (d.del) delOrder(d.del);
      else if (d.cmsg) {
        const msg = "Namaste " + (d.cname || "") + " andi 🍪\n" +
          "It's been a while! " + (d.cfav ? "Craving some " + d.cfav + "? " : "") +
          "Fresh batch ready andi 🙌";
        window.open(waUrl(d.cmsg, msg), "_blank");
      }
    });
    $("payModal").addEventListener("click", (e) => { if (e.target.id === "payModal") closePay(); });

    /* ---------- self-test (#selftest) ---------- */
    function selftest() {
      const sample = [{ price: 449, qty: 2 }, { price: 119, qty: 1 }];
      console.assert(orderTotal(sample) === 1017, "orderTotal failed");
      const saved = orders;
      orders = [{ customerPhone: "+91 98765 43210" }, { customerPhone: "9876543210" }, { customerPhone: "0123456789" }];
      console.assert(repeatCount("98765-43210") === 2, "repeatCount normalize failed");
      console.assert(repeatCount("999") === 0, "repeatCount short-phone failed");
      orders = saved;
      const pr = parseOrderIntoCart("Name: Priya\n9876543210\n2 peri peri 250g\n1 nutella tub");
      console.assert(pr.qtyById["cashew-peri-250g"] === 2 && pr.qtyById["tub-nutella"] === 1, "parse items failed");
      console.assert(pr.phone === "9876543210" && /priya/i.test(pr.name), "parse meta failed");
      orders = [
        { customerPhone: "9876543210", customerName: "Asha", total: 500, createdAt: 1, items: [{ name: "Nutella Tub", flavor: "", weight: "", qty: 1 }] },
        { customerPhone: "+91 98765 43210", customerName: "Asha", total: 700, createdAt: 2, items: [{ name: "Nutella Tub", flavor: "", weight: "", qty: 2 }] },
        { customerPhone: "", customerName: "Walkin", total: 100, createdAt: 3, items: [] }
      ];
      const cust = aggregateCustomers();
      console.assert(cust.length === 1, "customer grouping failed");
      console.assert(cust[0].count === 2 && cust[0].spent === 1200, "customer totals failed");
      console.assert(cust[0].fav === "Nutella Tub", "customer favourite failed");
      COSTS["cashew-peri-1kg"] = 1250; // costs are private/imported now, inject for the check
      console.assert(orderProfit({ total: 1699, items: [{ id: "cashew-peri-1kg", qty: 1 }] }) === 449, "orderProfit failed");
      orders = saved;
      console.log("selftest done — check for assertion errors above");
      showToast("Self-test ran — see console");
    }

    /* ---------- init ---------- */
    $("brandTitle").innerHTML = icon("cookie") + "Sundays Orders";
    $("fillPaste").innerHTML = icon("sparkles") + " Fill from paste";
    $("pasteSummary").innerHTML = icon("clipboard") + " Paste a WhatsApp order instead (optional)";
    $("exportBtn").innerHTML = icon("download") + " Backup (JSON)";
    $("importBtn").innerHTML = icon("upload") + " Restore";
    $("menuBtn").innerHTML = icon("menu");
    $("fab").innerHTML = icon("plus") + " New Order";
    const NAVIC = { new: "plus", orders: "list", customers: "user", pnl: "chart" };
    document.querySelectorAll(".nav-item[data-page]").forEach((b) => { b.innerHTML = icon(NAVIC[b.dataset.page]) + " " + b.textContent.trim(); });
    renderCatalog();
    showPage("orders");
    if (location.hash === "#selftest") selftest();
  </script>
</body>
</html>
